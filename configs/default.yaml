run_name: rlhf_production_run
output_dir: ./outputs/production_run
seed: 42
device: cuda
num_gpus: 8
use_fsdp: true
use_deepspeed: true
deepspeed_config: configs/deepspeed_zero3.yaml
log_to_wandb: true
wandb_project: rlhf-platform
wandb_entity: null
eval_steps: 500
save_steps: 500
save_total_limit: 5

model:
  policy_model_id: meta-llama/Llama-2-7b
  policy_model_revision: main
  reference_model_id: meta-llama/Llama-2-7b
  reward_model_id: microsoft/deberta-v3-large
  trust_remote_code: false
  load_in_8bit: false
  load_in_4bit: false
  use_peft_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  attn_implementation: flash_attention_2

optimization:
  optimizer: adamw
  learning_rate: 2e-5
  weight_decay: 0.01
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  num_train_epochs: 3
  mixed_precision: bf16
  gradient_checkpointing: true

alignment:
  method: ppo
  ppo_epsilon: 0.2
  ppo_num_epochs: 4
  target_kl: 0.1
  kl_coefficient: 0.1
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coefficient: 0.01
  value_loss_coefficient: 0.5
  advantage_normalization: true

dataset:
  dataset_name: Anthropic/hh-rlhf
  dataset_split: train
  preference_field: chosen
  rejected_field: rejected
  prompt_field: prompt
  batch_size: 32
  eval_batch_size: 64
  max_seq_length: 512
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
  preprocessing_num_workers: 4
